<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #fff; --border: #e8e5df;
    --text-primary: #1a1a18; --text-secondary: #8a8880; --text-muted: #b8b5ae;
    --accent: #2d2d2a; --user-bubble: #1a1a18; --user-text: #f7f6f3;
    --ai-bubble: #fff; --ai-text: #1a1a18;
  }
  html, body { height: 100%; font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; background: var(--bg); position: relative; }

  /* Header */
  header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 10px; }
  .hdot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; transition: background .4s; flex-shrink: 0; }
  .hdot.ready { background: #4caf82; animation: pulse 2.5s ease-in-out infinite; }
  .hdot.spin { background: #f0a030; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 2px rgba(76,175,130,.2)} 50%{box-shadow:0 0 0 5px rgba(76,175,130,.1)} }
  .htitle { font-size: 15px; font-weight: 500; }
  .hbadge { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); }

  /* Loading */
  #loading { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 32px; z-index: 100; }
  .licon { font-size: 36px; opacity: .45; margin-bottom: 4px; }
  .ltitle { font-size: 15px; font-weight: 500; }
  .lsub { font-size: 12px; color: var(--text-secondary); text-align: center; line-height: 1.7; }
  .dbadge { font-family: 'DM Mono', monospace; font-size: 11px; border-radius: 10px; padding: 3px 12px; }
  .dbadge.gpu { background: #e8f5ee; color: #2d7a52; }
  .dbadge.cpu { background: #fef3e2; color: #a06020; }
  .dbadge.checking { background: var(--border); color: var(--text-secondary); }
  .pwrap { width: 100%; max-width: 260px; }
  .pbar { height: 3px; background: #e8e5df; border-radius: 2px; overflow: hidden; }
  .pfill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width .3s; }
  .plabel { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 6px; text-align: right; }
  .lstatus { font-size: 11px; color: var(--text-secondary); text-align: center; min-height: 16px; max-width: 280px; }
  .errbox { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 8px; text-align: center; }
  .errtitle { font-size: 15px; font-weight: 500; color: #c0392b; }
  .errbody { font-size: 12px; color: var(--text-secondary); line-height: 1.7; }
  .rbtn { padding: 10px 24px; background: var(--accent); color: #fff; border: none; border-radius: 24px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; cursor: pointer; margin-top: 4px; }

  /* Messages */
  #messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  #messages::-webkit-scrollbar { display: none; }
  .mrow { display: flex; opacity: 0; transform: translateY(8px); animation: fadeUp .25s ease forwards; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .mrow.user { justify-content: flex-end; }
  .mrow.ai   { justify-content: flex-start; }
  .bubble { max-width: 78%; padding: 11px 14px; border-radius: 18px; font-size: 14.5px; line-height: 1.65; font-weight: 300; word-break: break-word; white-space: pre-wrap; }
  .mrow.user .bubble { background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 5px; }
  .mrow.ai   .bubble { background: var(--ai-bubble); color: var(--ai-text); border: 1px solid var(--border); border-bottom-left-radius: 5px; }
  .bubble.streaming::after { content: '▍'; display: inline-block; animation: blink .7s step-end infinite; margin-left: 1px; font-size: 12px; opacity: .7; }
  @keyframes blink { 0%,100%{opacity:.7} 50%{opacity:0} }

  /* Empty */
  #empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; gap: 6px; color: var(--text-muted); }
  #empty .eicon { font-size: 32px; opacity: .45; margin-bottom: 8px; }
  #empty .etitle { font-size: 15px; font-weight: 400; color: var(--text-secondary); }
  #empty .ehint  { font-size: 12.5px; line-height: 1.5; }
  .sugs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
  .chip { border: 1px solid var(--border); background: var(--surface); border-radius: 20px; padding: 7px 13px; font-size: 12.5px; font-family: 'Noto Sans JP', sans-serif; color: var(--text-secondary); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .chip:active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Input */
  #inputarea { padding: 10px 12px calc(16px + env(safe-area-inset-bottom)); background: var(--bg); border-top: 1px solid var(--border); }
  .irow { display: flex; align-items: flex-end; gap: 8px; background: #fff; border: 1px solid var(--border); border-radius: 26px; padding: 6px 6px 6px 16px; transition: border-color .15s; }
  .irow:focus-within { border-color: #aaa; }
  #inp { flex: 1; border: none; outline: none; background: transparent; font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: 300; color: var(--text-primary); resize: none; max-height: 120px; min-height: 24px; line-height: 1.5; padding: 4px 0; -webkit-appearance: none; }
  #inp::placeholder { color: var(--text-muted); }
  #sbtn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform .1s; -webkit-tap-highlight-color: transparent; }
  #sbtn:active { transform: scale(.9); }
  #sbtn:disabled { background: var(--border); cursor: default; }
  #sbtn svg { width: 16px; height: 16px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="hdot" id="hdot"></div>
    <span class="htitle">AI アシスタント</span>
    <span class="hbadge" id="hbadge">起動中…</span>
  </header>

  <div id="loading">
    <div class="licon">⬡</div>
    <div class="ltitle">モデルを読み込んでいます</div>
    <div class="lsub">初回は約300MBのダウンロードが発生します。<br>2回目以降はキャッシュから即起動します。</div>
    <div class="dbadge checking" id="dbadge">デバイス確認中…</div>
    <div class="pwrap">
      <div class="pbar"><div class="pfill" id="pfill"></div></div>
      <div class="plabel" id="plabel">0%</div>
    </div>
    <div class="lstatus" id="lstatus">初期化中…</div>
  </div>

  <div id="messages" style="display:none">
    <div id="empty">
      <div class="eicon">✦</div>
      <div class="etitle">何でも聞いてください</div>
      <div class="ehint">完全オフラインで動作しています</div>
      <div class="sugs">
        <button class="chip" onclick="useSug(this)">自己紹介して</button>
        <button class="chip" onclick="useSug(this)">簡単なレシピを教えて</button>
        <button class="chip" onclick="useSug(this)">英語に翻訳して</button>
        <button class="chip" onclick="useSug(this)">アイデアを出して</button>
      </div>
    </div>
  </div>

  <div id="inputarea" style="display:none">
    <div class="irow">
      <textarea id="inp" placeholder="メッセージを入力…" rows="1" disabled></textarea>
      <button id="sbtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script type="module">
// WebLLM — iOS Safari 含む全ブラウザ対応
import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

// iPhone Safari でも動く小さめモデル
// SmolLM2-1.7B は WebGPU 必須、Qwen2.5-0.5B-Instruct-q4f16_1 は Safari WebGPU で動作実績あり
const MODELS = [
  "Qwen2.5-0.5B-Instruct-q4f16_1-MLC",   // ~300MB, Safari WebGPU OK
  "SmolLM2-360M-Instruct-q4f16_1-MLC",   // ~200MB, フォールバック用
];

const hdot    = document.getElementById('hdot');
const hbadge  = document.getElementById('hbadge');
const loading = document.getElementById('loading');
const dbadge  = document.getElementById('dbadge');
const pfill   = document.getElementById('pfill');
const plabel  = document.getElementById('plabel');
const lstatus = document.getElementById('lstatus');
const msgs    = document.getElementById('messages');
const iarea   = document.getElementById('inputarea');
const inp     = document.getElementById('inp');
const sbtn    = document.getElementById('sbtn');

let engine = null, history = [], busy = false;

// ── WebGPU チェック（実際にアダプター取得まで確認）──
async function checkWebGPU() {
  if (!navigator.gpu) return false;
  try {
    const adapter = await navigator.gpu.requestAdapter();
    return !!adapter;
  } catch { return false; }
}

async function init() {
  hdot.className = 'hdot spin';

  const hasGPU = await checkWebGPU();
  dbadge.textContent = hasGPU ? '⚡ WebGPU' : '— WebGPU 非対応';
  dbadge.className   = 'dbadge ' + (hasGPU ? 'gpu' : 'cpu');

  if (!hasGPU) {
    showError(
      'WebGPU が使えません',
      'このブラウザはWebGPUに対応していません。<br><br>' +
      '✅ 対応ブラウザ：<br>' +
      'iPhone: Safari 17以降（iOS 17+）<br>' +
      'Android: Chrome 113以降<br>' +
      'PC: Chrome / Edge 113以降'
    );
    return;
  }

  // モデルを順番に試す
  for (let i = 0; i < MODELS.length; i++) {
    const model = MODELS[i];
    lstatus.textContent = `モデル読み込み中 (${i+1}/${MODELS.length})…`;
    pfill.style.width = '0%';
    plabel.textContent = '0%';
    try {
      engine = await CreateMLCEngine(model, {
        initProgressCallback: (r) => {
          const pct = Math.round((r.progress || 0) * 100);
          pfill.style.width = pct + '%';
          plabel.textContent = pct + '%';
          lstatus.textContent = r.text ? r.text.slice(0, 60) : '読み込み中…';
        }
      });
      // 成功
      loading.style.display = 'none';
      msgs.style.display    = 'flex';
      iarea.style.display   = 'block';
      inp.disabled = false;
      hdot.className = 'hdot ready';
      hbadge.textContent = '⚡ WebGPU';
      return;
    } catch(e) {
      console.warn(`Model ${model} failed:`, e);
      if (i === MODELS.length - 1) {
        showError('読み込みエラー',
          'モデルの読み込みに失敗しました。<br>Wi-Fi接続を確認して再試行してください。<br><br>' +
          '<small style="opacity:.6">' + e.message.slice(0, 100) + '</small>');
      }
    }
  }
}

function showError(title, body) {
  hdot.className = 'hdot';
  loading.innerHTML = `
    <div class="errbox">
      <div style="font-size:32px">✕</div>
      <div class="errtitle">${title}</div>
      <div class="errbody">${body}</div>
      <button class="rbtn" onclick="location.reload()">再試行</button>
    </div>`;
}

// ── 送信 ──
async function send() {
  const text = inp.value.trim();
  if (!text || busy || !engine) return;
  busy = true; sbtn.disabled = true;
  inp.value = ''; inp.style.height = 'auto';
  removeEmpty();
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  const bubble = addMsg('ai', '');
  bubble.classList.add('streaming');
  let reply = '';
  try {
    const stream = await engine.chat.completions.create({
      messages: [
        { role: 'system', content: 'あなたは親切で役立つAIアシスタントです。日本語で簡潔にわかりやすく答えてください。' },
        ...history
      ],
      stream: true, temperature: 0.7, max_tokens: 512
    });
    for await (const chunk of stream) {
      const delta = chunk.choices[0]?.delta?.content || '';
      reply += delta;
      bubble.textContent = reply;
      scrollBot();
    }
    bubble.classList.remove('streaming');
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    bubble.classList.remove('streaming');
    bubble.textContent = '⚠️ エラーが発生しました。';
    history.pop();
  } finally {
    busy = false;
    sbtn.disabled = !inp.value.trim();
    inp.focus();
  }
}

function removeEmpty() { const e = document.getElementById('empty'); if(e) e.remove(); }
function addMsg(role, text) {
  const row = document.createElement('div'); row.className = 'mrow ' + role;
  const b   = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
  row.appendChild(b); msgs.appendChild(row); scrollBot(); return b;
}
function scrollBot() { msgs.scrollTo({ top: msgs.scrollHeight, behavior: 'smooth' }); }

inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  sbtn.disabled = !inp.value.trim() || busy;
});
inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); }});
sbtn.addEventListener('click', send);
window.useSug = el => { inp.value = el.textContent; send(); };

init();
</script>
</body>
</html>
